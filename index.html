<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChartFrame — 图表装裱工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<style>
  :root {
    --bg: #eae8e3;
    --card: #fff;
    --text: #1a1a1a;
    --sub: #777;
    --accent: #3b82f6;
    --accent-bg: #eff6ff;
    --border: #e0ddd7;
    --input-bg: #fafaf8;
    --sh: 0 1px 3px rgba(0,0,0,.04), 0 6px 20px rgba(0,0,0,.05);
    --sh-lg: 0 8px 32px rgba(0,0,0,.09);
    --r: 10px;
  }

  @font-face {
    font-family: 'OPPO Sans 4.0';
    src: local('OPPO Sans 4.0'), local('OPPOSans4.0'), local('OPPO Sans'), local('OPPOSans');
    font-weight: 100 900;
    font-display: swap;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'OPPO Sans 4.0', 'OPPO Sans', -apple-system, 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .hdr {
    padding: 22px 32px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .hdr .logo { height: 26px; width: auto; display: block; }
  .hdr .title-group { display: flex; align-items: baseline; gap: 10px; }
  .hdr h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .hdr span { font-size: 12px; color: var(--sub); font-weight: 300; }



  .wrap {
    display: grid;
    grid-template-columns: 310px 1fr;
    gap: 20px;
    padding: 0 32px 32px;
    max-width: 1400px;
  }

  .pnl {
    background: var(--card);
    border-radius: var(--r);
    box-shadow: var(--sh);
    padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
    height: fit-content;
    position: sticky; top: 14px;
  }

  .sec {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.2px; color: #aaa; margin-bottom: 2px;
  }

  .fg { display:flex; flex-direction:column; gap:3px; }
  .fg label { font-size: 12px; font-weight: 500; color: #555; }
  .fg input, .fg textarea {
    font-family: 'OPPO Sans 4.0', 'OPPO Sans', -apple-system, sans-serif;
    font-size: 13px; padding: 8px 10px;
    border: 1.5px solid var(--border); border-radius: 6px;
    background: var(--input-bg); color: var(--text);
    outline: none; transition: border .2s, box-shadow .2s;
  }
  .fg input:focus, .fg textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg);
  }
  .fg textarea { resize: vertical; min-height: 42px; }

  .hr { height:1px; background:var(--border); }

  .btn {
    font-family: 'OPPO Sans 4.0', 'OPPO Sans', -apple-system, sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 10px 16px; border: none; border-radius: 7px;
    cursor: pointer; transition: all .12s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .bp { background: var(--accent); color: #fff; }
  .bp:hover { background: #2563eb; }
  .bp:active { transform: scale(.98); }
  .bs { background: #eeebe5; color: var(--text); }
  .bs:hover { background: #e4e0d9; }
  .bd { background: #fef2f2; color: #dc2626; font-size: 11px; padding: 6px 10px; }
  .bd:hover { background: #fee2e2; }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

  .scl {
    display: flex; gap: 2px; background: #eeebe5;
    border-radius: 5px; padding: 2px;
  }
  .scl button {
    font-family: 'OPPO Sans 4.0', 'OPPO Sans', -apple-system, sans-serif;
    font-size: 11px; padding: 4px 10px; border: none;
    border-radius: 4px; background: transparent; cursor: pointer;
    color: var(--sub); font-weight: 500; transition: all .12s;
  }
  .scl button.on {
    background: #fff; color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,.06);
  }

  .font-status {
    font-size: 11px; padding: 6px 10px; border-radius: 6px; line-height: 1.5;
  }
  .font-status.ok { background: #f0fdf4; color: #16a34a; }
  .font-status.warn { background: #fffbeb; color: #b45309; }

  /* Tab switcher */
  .tabs {
    display: flex; gap: 0; background: #eeebe5; border-radius: 6px; padding: 2px;
  }
  .tabs button {
    font-family: 'OPPO Sans 4.0', 'OPPO Sans', -apple-system, sans-serif;
    font-size: 12px; padding: 6px 14px; border: none;
    border-radius: 4px; background: transparent; cursor: pointer;
    color: var(--sub); font-weight: 500; transition: all .12s; flex: 1;
  }
  .tabs button.on {
    background: #fff; color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,.06);
  }

  .wm-preview {
    width: 100%; height: 48px;
    background: #f8f7f5; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
    border: 1.5px solid var(--border);
  }
  .wm-preview img {
    max-height: 36px; max-width: 80%; object-fit: contain;
  }
  .wm-preview span {
    font-size: 11px; color: #bbb;
  }

  .range-row {
    display: flex; align-items: center; gap: 8px;
  }
  .range-row input[type="range"] {
    flex: 1; height: 3px; -webkit-appearance: none; appearance: none;
    background: var(--border); border-radius: 1.5px; outline: none;
  }
  .range-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }
  .range-row input[type="range"]::-moz-range-track {
    height: 3px; background: var(--border); border-radius: 1.5px; border: none;
  }
  .range-row input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: none;
  }
  .range-row .rv {
    font-size: 11px; color: var(--sub); min-width: 32px; text-align: right;
  }

  .saved-badge {
    display: inline-block;
    font-size: 10px;
    background: #f0fdf4;
    color: #16a34a;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
    margin-left: 4px;
  }

  /* Preview */
  .prev {
    display: flex; align-items: flex-start; justify-content: center;
  }
  .cw {
    border-radius: var(--r);
    box-shadow: var(--sh-lg);
    overflow: hidden;
    max-width: 880px; width: 100%;
  }

  #pcard {
    background: #fff;
    position: relative;
    font-family: 'OPPO Sans 4.0', 'OPPO Sans', -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center;
  }

  #pcard .top-title {
    font-size: 22px; font-weight: 700; color: #1a1a1a;
    text-align: center; line-height: 1.45;
    padding: 40px 48px 0; letter-spacing: 0.3px;
    position: relative; z-index: 1;
  }
  #pcard .top-subtitle {
    font-size: 14px; font-weight: 400; color: #888;
    text-align: center; padding: 6px 48px 0; line-height: 1.5;
    position: relative; z-index: 1;
  }
  #pcard .img-area {
    width: 100%; padding: 24px 32px 16px;
    display: flex; justify-content: center;
    position: relative; z-index: 1;
  }
  #pcard .img-area img { max-width: 100%; display: block; }
  #pcard .img-area .ph {
    width: 100%; min-height: 220px; background: #f8f7f5;
    border-radius: 8px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    color: #ccc; font-size: 13px;
  }
  #pcard .img-area .ph svg { opacity: .25; }
  #pcard .bottom-bar {
    width: 100%; padding: 4px 40px 32px;
    display: flex; justify-content: center; gap: 20px;
    position: relative; z-index: 1;
  }
  #pcard .note-text { font-size: 12px; color: #aaa; line-height: 1.5; }
  #pcard .source-text { font-size: 12px; color: #999; text-align: center; white-space: pre-wrap; }

  /* Watermark overlay layer */
  #wm-layer {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }

  .drop-ov {
    position: fixed; inset: 0;
    background: rgba(59,130,246,.08);
    border: 3px dashed var(--accent);
    display: none; align-items: center; justify-content: center;
    z-index: 100; font-size: 15px; color: var(--accent); font-weight: 600;
    border-radius: 12px; margin: 8px;
  }
  .drop-ov.on { display: flex; }
  .hid { display: none !important; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; color: #fff; padding: 10px 22px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; }
  .exporting .bp { opacity: .6; pointer-events: none; }

  @media (max-width: 860px) {
    .wrap { grid-template-columns: 1fr; padding: 0 12px 20px; }
    .pnl { position: static; }
    .hdr { padding: 16px 12px 10px; }
  }
</style>
</head>
<body>

<div class="hdr">
  <svg class="logo" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M930.344 950H69.748L69.2392 916.231C68.9908 899.763 68.9261 717.613 69.0927 511.504C69.2594 305.363 69.4093 118.086 69.4257 95.332L69.458 50H930.344V950ZM138.78 879.604H543.366V745.903H613.788V879.604H648.616V643.982H719.037V879.604H754.962V492.747H825.437L824.841 879.604H861.018V119.3H138.78V879.604Z" fill="currentColor"/>
  </svg>
  <div class="title-group">
    <h1>ChartFrame</h1>
    <span>图表装裱：加标题、加来源、加水印、导高清图</span>
  </div>
</div>



<div class="wrap">
  <div class="pnl">
    <!-- Image -->
    <div>
      <div class="sec">图片</div>
      <div class="btn-row" style="margin-top:4px">
        <button class="btn bs" onclick="document.getElementById('fi').click()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          选择文件
        </button>
        <button class="btn bs" onclick="doPaste()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          粘贴截图
        </button>
      </div>
      <input type="file" id="fi" accept="image/*" style="display:none" onchange="loadFile(this.files[0])">
    </div>

    <div class="hr"></div>

    <!-- Annotations -->
    <div>
      <div class="sec">标注</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:2px">
        <div class="fg">
          <label>标题</label>
          <input id="i-title" placeholder="2024年Q3营收趋势" oninput="render()">
        </div>
        <div class="fg">
          <label>副标题 <span style="color:#bbb;font-weight:300">（可选）</span></label>
          <input id="i-sub" placeholder="同比增长 12.5%" oninput="render()">
        </div>
        <div class="fg">
          <label>注释 <span style="color:#bbb;font-weight:300">（可选）</span></label>
          <textarea id="i-note" placeholder="虚线部分为预测值" oninput="render()"></textarea>
        </div>
        <div class="fg">
          <label>底部说明</label>
          <textarea id="i-src" placeholder="数据统计区间：2022/1/1 ~ 2025/6/30" oninput="render()">数据来源：
数据范围：</textarea>
        </div>
      </div>
    </div>

    <div class="hr"></div>

    <!-- Watermark -->
    <div>
      <div class="sec">水印</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:2px">
        <!-- Mode tabs -->
        <div class="tabs" id="wm-tabs">
          <button class="on" onclick="setWmMode('off',this)">关闭</button>
          <button onclick="setWmMode('text',this)">文字水印</button>
          <button onclick="setWmMode('image',this)">图片水印</button>
        </div>

        <!-- Text watermark -->
        <div id="wm-text-opts" class="hid">
          <div style="display:flex;flex-direction:column;gap:8px">
            <div class="fg">
              <label>水印文字</label>
              <input id="wm-text" placeholder="公司名称 / 机密" oninput="renderWatermark();localStorage.setItem('chartframe-wm-text',this.value)">
            </div>
            <div class="fg">
              <label>字号</label>
              <div class="range-row">
                <input type="range" id="wm-text-size" min="12" max="48" value="20" oninput="renderWatermark();this.nextElementSibling.textContent=this.value+'px'">
                <span class="rv">20px</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Image watermark -->
        <div id="wm-img-opts" class="hid">
          <div style="display:flex;flex-direction:column;gap:8px">
            <div class="wm-preview" id="wm-img-preview">
              <span id="wm-img-hint">未上传水印图片</span>
              <img id="wm-img-thumb" class="hid">
            </div>
            <div class="btn-row">
              <button class="btn bs" style="font-size:12px" onclick="document.getElementById('wm-fi').click()">上传水印图片</button>
              <button class="btn bs" style="font-size:12px" onclick="saveWmImage()">
                保存为默认
                <span id="wm-saved-dot" class="hid saved-badge">已保存</span>
              </button>
            </div>
            <button class="btn bd" id="wm-clear-btn" onclick="clearSavedWm()" style="display:none">清除已保存的默认水印</button>
            <input type="file" id="wm-fi" accept="image/*" style="display:none" onchange="loadWmImage(this.files[0])">
            <div class="fg">
              <label>水印大小</label>
              <div class="range-row">
                <input type="range" id="wm-img-size" min="5" max="100" value="100" oninput="renderWatermark();this.nextElementSibling.textContent=this.value+'%'">
                <span class="rv">100%</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Common watermark controls (shown when not off) -->
        <div id="wm-common" class="hid">
          <div style="display:flex;flex-direction:column;gap:8px">
            <div class="fg">
              <label>透明度</label>
              <div class="range-row">
                <input type="range" id="wm-opacity" min="2" max="40" value="5" oninput="renderWatermark();this.nextElementSibling.textContent=this.value+'%'">
                <span class="rv">5%</span>
              </div>
            </div>
            <div class="fg">
              <label>旋转角度</label>
              <div class="range-row">
                <input type="range" id="wm-rotate" min="-60" max="0" value="-25" oninput="renderWatermark();this.nextElementSibling.textContent=this.value+'°'">
                <span class="rv">-25°</span>
              </div>
            </div>
            <div class="fg">
              <label>间距</label>
              <div class="range-row">
                <input type="range" id="wm-gap" min="60" max="300" value="150" oninput="renderWatermark();this.nextElementSibling.textContent=this.value+'px'">
                <span class="rv">150px</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="hr"></div>

    <!-- Export -->
    <div>
      <div class="sec">导出</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:2px">
        <div class="fg">
          <label>倍率 <span style="color:#bbb;font-weight:300">（越高越清晰）</span></label>
          <div class="scl">
            <button onclick="setS(1,this)">1x</button>
            <button onclick="setS(2,this)">2x</button>
            <button onclick="setS(3,this)">3x</button>
            <button class="on" onclick="setS(4,this)">4x</button>
          </div>
        </div>
        <button class="btn bp" onclick="doExport('png')" style="margin-top:2px">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          导出 PNG
        </button>
        <button class="btn bs" onclick="doExport('jpeg')">导出 JPG</button>
        <button class="btn bs" onclick="doExportAs('png')" style="font-size:11px;padding:7px 12px;color:#888">另存为… (选择位置)</button>
      </div>
    </div>

    <div class="hr"></div>

    <!-- Font -->
    <div>
      <div class="sec">字体</div>
      <div id="font-info" class="font-status warn" style="margin-top:2px">正在检测 OPPO Sans 4.0 …</div>
      <button class="btn bs" onclick="document.getElementById('font-fi').click()" style="margin-top:6px;font-size:12px">
        上传 OPPO Sans 4.0 字体文件
      </button>
      <input type="file" id="font-fi" accept=".ttf,.otf,.woff,.woff2" style="display:none" onchange="loadFont(this.files[0])">
    </div>
  </div>

  <!-- Preview -->
  <div class="prev">
    <div class="cw">
      <div id="pcard">
        <div class="top-title" id="ct"></div>
        <div class="top-subtitle" id="cs"></div>
        <div class="img-area" id="img-area">
          <div class="ph" id="ph">
            <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <span>拖入图表截图 · Ctrl/Cmd+V 粘贴 · 或选择文件</span>
          </div>
          <img id="ci" class="hid" crossorigin="anonymous">
        </div>
        <div class="bottom-bar" id="bb">
          <div class="note-text" id="cn"></div>
          <div class="source-text" id="csr"></div>
        </div>
        <!-- Watermark layer -->
        <div id="wm-layer"></div>
      </div>
    </div>
  </div>
</div>

<div class="drop-ov" id="dov">释放以添加图片</div>
<div class="toast" id="toast"></div>

<script>
let sc = 4;
let wmMode = 'off';     // 'off' | 'text' | 'image'
let wmImageData = null;  // data URL of watermark image

// ===== Utilities =====
function setS(v, b) {
  sc = v;
  b.parentElement.querySelectorAll('button').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== Font =====
async function checkFont() {
  const info = document.getElementById('font-info');
  if (document.fonts) {
    try {
      const loaded = await document.fonts.load('16px "OPPO Sans 4.0"');
      if (loaded.length > 0) { info.className = 'font-status ok'; info.textContent = '✓ 已检测到本机 OPPO Sans 4.0'; return; }
    } catch {}
    try {
      const loaded = await document.fonts.load('16px "OPPO Sans"');
      if (loaded.length > 0) { info.className = 'font-status ok'; info.textContent = '✓ 已检测到本机 OPPO Sans'; return; }
    } catch {}
  }
  info.className = 'font-status warn';
  info.textContent = '未检测到 OPPO Sans 4.0，使用系统默认字体。可上传字体文件。';
}

async function loadFont(file) {
  if (!file) return;
  try {
    const buf = await file.arrayBuffer();
    const face = new FontFace('OPPO Sans 4.0', buf);
    await face.load();
    document.fonts.add(face);
    document.getElementById('font-info').className = 'font-status ok';
    document.getElementById('font-info').textContent = '✓ 已加载 ' + file.name;
    toast('字体已加载');
    render();
  } catch (e) { toast('字体加载失败：' + e.message); }
}

setTimeout(checkFont, 300);

// ===== Render card =====
function render() {
  const title = document.getElementById('i-title').value;
  const sub = document.getElementById('i-sub').value;
  const note = document.getElementById('i-note').value;
  const src = document.getElementById('i-src').value;

  const ct = document.getElementById('ct');
  ct.textContent = title;
  ct.style.display = title ? 'block' : 'none';

  const cs = document.getElementById('cs');
  cs.textContent = sub;
  cs.style.display = sub ? 'block' : 'none';

  const ia = document.getElementById('img-area');
  ia.style.paddingTop = (!title && !sub) ? '40px' : '24px';

  const cn = document.getElementById('cn');
  const csr = document.getElementById('csr');
  const bb = document.getElementById('bb');
  cn.textContent = note;
  csr.textContent = src;
  bb.style.display = (note || src) ? 'flex' : 'none';
}

// ===== Image =====
function loadFile(f) {
  if (!f) return;
  const rd = new FileReader();
  rd.onload = e => {
    document.getElementById('ci').src = e.target.result;
    document.getElementById('ci').classList.remove('hid');
    document.getElementById('ph').classList.add('hid');
    toast('图片已加载');
  };
  rd.readAsDataURL(f);
}

// Drag & drop
const dov = document.getElementById('dov');
let dragC = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dragC++; dov.classList.add('on'); });
document.addEventListener('dragleave', e => { dragC--; if (dragC <= 0) { dragC = 0; dov.classList.remove('on'); } });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault(); dragC = 0; dov.classList.remove('on');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

document.addEventListener('paste', e => {
  // Don't intercept paste in text inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const it of items) {
    if (it.type.startsWith('image/')) { loadFile(it.getAsFile()); break; }
  }
});

async function doPaste() {
  try {
    const items = await navigator.clipboard.read();
    for (const it of items) {
      for (const tp of it.types) {
        if (tp.startsWith('image/')) { loadFile(await it.getType(tp)); return; }
      }
    }
    toast('剪贴板中没有图片');
  } catch { toast('请直接 Ctrl+V / Cmd+V 粘贴'); }
}

// ===== Watermark =====
function setWmMode(mode, btn) {
  wmMode = mode;
  btn.parentElement.querySelectorAll('button').forEach(x => x.classList.remove('on'));
  btn.classList.add('on');

  document.getElementById('wm-text-opts').classList.toggle('hid', mode !== 'text');
  document.getElementById('wm-img-opts').classList.toggle('hid', mode !== 'image');
  document.getElementById('wm-common').classList.toggle('hid', mode === 'off');

  renderWatermark();
}

function loadWmImage(file) {
  if (!file) return;
  const rd = new FileReader();
  rd.onload = e => {
    wmImageData = e.target.result;
    document.getElementById('wm-img-thumb').src = wmImageData;
    document.getElementById('wm-img-thumb').classList.remove('hid');
    document.getElementById('wm-img-hint').classList.add('hid');
    // Reset slider to 100%
    const slider = document.getElementById('wm-img-size');
    slider.value = 100;
    slider.nextElementSibling.textContent = '100%';
    renderWatermark();
    toast('水印图片已加载');
  };
  rd.readAsDataURL(file);
}

function saveWmImage() {
  if (!wmImageData) { toast('请先上传水印图片'); return; }
  try {
    localStorage.setItem('chartframe-wm-image', wmImageData);
    document.getElementById('wm-saved-dot').classList.remove('hid');
    document.getElementById('wm-clear-btn').style.display = '';
    toast('水印已保存为默认');
  } catch (e) {
    toast('保存失败（图片可能过大）');
  }
}

function clearSavedWm() {
  localStorage.removeItem('chartframe-wm-image');
  document.getElementById('wm-saved-dot').classList.add('hid');
  document.getElementById('wm-clear-btn').style.display = 'none';
  toast('已清除默认水印');
}

function loadSavedWm() {
  try {
    const saved = localStorage.getItem('chartframe-wm-image');
    if (saved) {
      wmImageData = saved;
      document.getElementById('wm-img-thumb').src = wmImageData;
      document.getElementById('wm-img-thumb').classList.remove('hid');
      document.getElementById('wm-img-hint').classList.add('hid');
      document.getElementById('wm-saved-dot').classList.remove('hid');
      document.getElementById('wm-clear-btn').style.display = '';
    }
  } catch {}
}

function renderWatermark() {
  const layer = document.getElementById('wm-layer');
  layer.innerHTML = '';

  if (wmMode === 'off') { layer.style.display = 'none'; return; }
  layer.style.display = 'block';

  const opacity = parseInt(document.getElementById('wm-opacity').value) / 100;
  const rotate = parseInt(document.getElementById('wm-rotate').value);
  const gap = parseInt(document.getElementById('wm-gap').value);

  // Generate a single tile on a canvas, then set as background-image
  const tileCanvas = document.createElement('canvas');
  const ctx = tileCanvas.getContext('2d');

  if (wmMode === 'text') {
    const text = document.getElementById('wm-text').value;
    if (!text) { layer.style.display = 'none'; return; }
    const fontSize = parseInt(document.getElementById('wm-text-size').value);
    ctx.font = `${fontSize}px "OPPO Sans 4.0", "OPPO Sans", sans-serif`;
    const metrics = ctx.measureText(text);
    const tw = metrics.width;
    const th = fontSize * 1.2;

    tileCanvas.width = tw + gap;
    tileCanvas.height = th + gap;

    ctx.font = `${fontSize}px "OPPO Sans 4.0", "OPPO Sans", sans-serif`;
    ctx.fillStyle = `rgba(0,0,0,${opacity})`;
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 0, tileCanvas.height / 2);
  } else if (wmMode === 'image') {
    if (!wmImageData) { layer.style.display = 'none'; return; }
    const pct = parseInt(document.getElementById('wm-img-size').value) / 100;
    // Base width = card width, then scale by percentage
    const cardW = document.getElementById('pcard').offsetWidth;
    const size = cardW * pct;

    // We need to draw the image — load it first
    const img = new Image();
    img.onload = () => {
      const aspect = img.width / img.height;
      const w = size;
      const h = size / aspect;
      tileCanvas.width = w + gap;
      tileCanvas.height = h + gap;
      ctx.globalAlpha = opacity;
      ctx.drawImage(img, 0, (tileCanvas.height - h) / 2, w, h);
      applyTile(layer, tileCanvas, rotate);
    };
    img.src = wmImageData;
    return; // async, will call applyTile when ready
  }

  applyTile(layer, tileCanvas, rotate);
}

function applyTile(layer, tileCanvas, rotate) {
  const dataUrl = tileCanvas.toDataURL();
  // Use a large inner div with the tiled background, rotated
  // Expand inner div so rotation doesn't leave gaps
  layer.innerHTML = '';
  const inner = document.createElement('div');
  const expand = 1.8; // expand to cover corners after rotation
  inner.style.cssText = `
    position: absolute;
    top: 50%; left: 50%;
    width: ${100 * expand}%;
    height: ${100 * expand}%;
    transform: translate(-50%, -50%) rotate(${rotate}deg);
    background-image: url(${dataUrl});
    background-repeat: repeat;
    pointer-events: none;
  `;
  layer.appendChild(inner);
}

// ===== Export =====
async function doExport(fmt) {
  const el = document.getElementById('pcard');
  document.body.classList.add('exporting');

  try {
    const canvas = await html2canvas(el, {
      scale: sc,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false,
    });

    const mimeType = fmt === 'jpeg' ? 'image/jpeg' : 'image/png';
    const ext = fmt === 'jpeg' ? 'jpg' : 'png';
    const fileName = `chart-${Date.now()}.${ext}`;

    // Default: download to Downloads folder
    fallbackDownload(canvas, mimeType, fileName);
  } catch (e) {
    toast('导出失败：' + e.message);
    console.error(e);
  }
  document.body.classList.remove('exporting');
}

async function doExportAs(fmt) {
  const el = document.getElementById('pcard');
  document.body.classList.add('exporting');

  try {
    const canvas = await html2canvas(el, {
      scale: sc,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false,
    });

    const mimeType = fmt === 'jpeg' ? 'image/jpeg' : 'image/png';
    const ext = fmt === 'jpeg' ? 'jpg' : 'png';
    const fileName = `chart-${Date.now()}.${ext}`;

    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: fileName,
          types: [{ description: fmt === 'jpeg' ? 'JPEG Image' : 'PNG Image', accept: { [mimeType]: [`.${ext}`] } }],
        });
        const writable = await handle.createWritable();
        const blob = await new Promise(r => canvas.toBlob(r, mimeType, 0.96));
        await writable.write(blob);
        await writable.close();
        toast('已保存');
      } catch (e) {
        if (e.name !== 'AbortError') fallbackDownload(canvas, mimeType, fileName);
      }
    } else {
      fallbackDownload(canvas, mimeType, fileName);
    }
  } catch (e) {
    toast('导出失败：' + e.message);
    console.error(e);
  }
  document.body.classList.remove('exporting');
}

function fallbackDownload(canvas, mimeType, fileName) {
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 3000);
    toast('已下载');
  }, mimeType, 0.96);
}

// ===== Init =====
render();
loadSavedWm();

  const savedWmText = localStorage.getItem('chartframe-wm-text');
  if (savedWmText) {
    document.getElementById('wm-text').value = savedWmText;
  }
} catch {}
